version: "2"

linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
        path: (test/|pkg/support/)
      - linters:
          - gosec
        path: (test/|pkg/support/|pkg/kubernetes/|pkg/clients/)
      - linters:
          - goconst
          - prealloc
          - staticcheck
        path: test/

formatters:
  enable:
    - gofmt
    - goimports
